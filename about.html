<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视觉一中—关于</title>
    <!-- 引入外部 CSS (复用 show.css 的基础样式) -->
    <link rel="stylesheet" href="./css/show.css">

    <style>
        /* 针对 About 页面的特定样式 */
        body {
            /* 设置指定背景图 */
            background-image: url('https://video--online.oss-cn-beijing.aliyuncs.com/webres/background2.JPG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .about-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .about-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 60px 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .about-title {
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .about-text {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #f0f0f0;
        }

        .highlight {
            color: #ffd700;
            /* 金色高亮关键信息 */
            font-weight: bold;
        }

        /* 【修改】联系方式样式 */
        .contact-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
        }

        /* 新增：联系二维码容器样式 */
        .contact-qr-container {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            cursor: pointer;
            /* 提示可点击 */
        }

        .contact-qr-container:hover {
            transform: scale(1.05);
        }

        .contact-qr-img {
            width: 150px;
            /* 根据需要调整大小 */
            height: 150px;
            object-fit: contain;
            display: block;
        }

        .btn-home {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            margin-top: 30px;
            /* 增加间距，因为去掉了微信号按钮 */
        }

        .btn-home:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }

        .btn-sponsor {
            display: inline-block;
            background-color: #ff9800;
            /* 橙色，区别于首页按钮 */
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            margin-top: 15px;
            margin-bottom: 20px;
            /* 与返回首页按钮保持间距 */
        }

        .btn-sponsor:hover {
            background-color: #e68900;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }

        /* 【通用】模态框样式 */
        .modal-overlay {
            display: none;
            /* 默认隐藏 */
            position: fixed;
            /* 关键：固定定位 */
            z-index: 9999;
            /* 提高层级，确保在所有元素之上 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            /*黑色半透明背景稍微加深一点以便看清图片*/
            backdrop-filter: blur(5px);
            /* 背景模糊效果 */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            /* 添加以下属性，防止被父级裁剪 */
            transform-origin: center center;
        }

        /* 专门用于放大查看二维码的模态框内容样式 */
        .modal-qr-content {
            background: transparent;
            box-shadow: none;
            max-width: 90%;
            padding: 10px;
        }

        .modal-qr-img {
            max-width: 100%;
            max-height: 80vh;
            width: auto;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background: #fff;
            padding: 10px;
        }

        .qr-code-container {
            margin: 20px 0;
            padding: 10px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 10px;
            display: inline-block;
            /* 增加最大宽度限制 */
            max-width: 100%;
        }

        .qr-code-img {
            width: 100%;
            /* 改为 100%，自适应容器 */
            height: auto;
            /* 保持宽高比 */
            object-fit: contain;
            /* 确保图片完整显示 */
            display: block;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #333;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .about-card {
                padding: 40px 20px;
            }

            .about-title {
                font-size: 1.8rem;
            }

            .about-text {
                font-size: 1rem;
            }

            .contact-qr-img {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>

<body>

    <!-- 统一顶部导航 -->
    <header>
        <div class="logo">
            <img src="https://video--online.oss-cn-beijing.aliyuncs.com/webres/Logo.png" alt="Logo">
            <span>视觉一中</span>
        </div>
        <nav>
            <ul>
                <li><a href="./upload.html">上传</a></li>
                <li><a href="./shows.html">画廊</a></li>
                <li><a href="./index.html">首页</a></li>
            </ul>
        </nav>
    </header>

    <!-- 主内容区 -->
    <div class="about-container">
        <div class="about-card">
            <h1 class="about-title">👋 你好，欢迎来到视觉一中</h1>

            <p class="about-text">
                这里是一个属于呼和浩特第一中学学生的自由空间。<br><br>
                我们承诺：<span class="highlight">这里没有强制收费</span>。<br>
                你可以随意分享你在校园里的所见所闻，<br>
                无论是操场上的夕阳，还是教室里的日常。<br>
                让瞬间成为永恒，让记忆有迹可循。
            </p>

            <!-- 【修改】联系方式区域：改为展示二维码，点击可放大 -->
            <div class="contact-section">
                <div class="contact-label">如有问题或建议，扫码添加管理员好友：<br><span
                        style="font-size: 0.8em; opacity: 0.7;">(点击图片可放大查看)</span></div>
                <!-- 请确保 ./images/friend_qr.png 是您添加的二维码图片路径 -->
                <div class="contact-qr-container" onclick="openContactQrModal()">
                    <img src="https://video--online.oss-cn-beijing.aliyuncs.com/webres/friend_qr.png" alt="管理员微信二维码" class="contact-qr-img">
                </div>
            </div>

            <button class="btn-sponsor" onclick="openSponsorModal()">☕ 请我喝杯咖啡 (赞助)</button>

            <a href="./index.html" class="btn-home">返回首页</a>
        </div>

        <!-- 赞助模态框 -->
        <div id="sponsorModal" class="modal-overlay" onclick="closeSponsorModal(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <span class="close-btn" onclick="closeSponsorModal()">&times;</span>
                <h2>感谢您的支持！</h2>
                <p>您的赞助将用于维持服务器运行及网站开发。</p>

                <div class="qr-code-container">
                    <img src="https://video--online.oss-cn-beijing.aliyuncs.com/webres/qrcode.jpg" alt="收款码" class="qr-code-img">
                </div>

                <p class="scan-tip">长按识别二维码或截图保存</p>
            </div>
        </div>

        <!-- 【新增】联系二维码放大模态框 -->
        <div id="contactQrModal" class="modal-overlay" onclick="closeContactQrModal(event)">
            <div class="modal-content modal-qr-content" onclick="event.stopPropagation()">
                <span class="close-btn" style="color: #fff; text-shadow: 0 0 5px #000;"
                    onclick="closeContactQrModal()">&times;</span>
                <img src="https://video--online.oss-cn-beijing.aliyuncs.com/webres/friend_qr.png" alt="管理员微信二维码大图" class="modal-qr-img">
                <p style="color: #fff; margin-top: 10px; text-shadow: 0 0 5px #000;">长按识别二维码添加好友</p>
            </div>
        </div>
    </div>

    <script>
        // 【新增】打开联系二维码模态框
        function openContactQrModal() {
            const modal = document.getElementById('contactQrModal');
            modal.style.display = 'flex';
            // 强制重绘以触发 transition
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }

        // 【新增】关闭联系二维码模态框
        function closeContactQrModal(event) {
            // 如果传入了 event 且点击的是遮罩层本身，或者没有传入 event (点击关闭按钮)
            if (!event || event.target.id === 'contactQrModal') {
                const modal = document.getElementById('contactQrModal');
                modal.classList.remove('show');

                // 等待动画结束后隐藏 display
                setTimeout(() => {
                    modal.style.display = 'none';
                }, 300);
            }
        }

        function openSponsorModal() {
            const modal = document.getElementById('sponsorModal');
            modal.style.display = 'flex';
            // 强制重绘以触发 transition
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }

        function closeSponsorModal(event) {
            // 如果传入了 event 且点击的是遮罩层本身，或者没有传入 event (点击关闭按钮)
            if (!event || event.target.id === 'sponsorModal') {
                const modal = document.getElementById('sponsorModal');
                modal.classList.remove('show');

                // 等待动画结束后隐藏 display
                setTimeout(() => {
                    modal.style.display = 'none';
                }, 300);
            }
        }
    </script>

</body>

</html>
