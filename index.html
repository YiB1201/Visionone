<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视觉一中</title>
    <link rel="icon" href="https://video--online.oss-cn-beijing.aliyuncs.com/webres/Logo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* 顶部主菜单 */
        header {
            background-color: #007bff; /* 蓝色背景 */
            color: white;
            padding: 0 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 30px;
            margin-right: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: opacity 0.3s;
            cursor: pointer;
        }

        nav a:hover {
            opacity: 0.8;
        }

        /* 大字标题区域 (Hero Section) */
        .hero-section {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            padding: 60px 20px;
            text-align: center;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        /* 每周精选 (照片栏位) */
        .gallery-section {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-left: 5px solid #007bff;
            padding-left: 10px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5列 */
            gap: 15px;
        }

        .photo-item {
            background-color: #ddd;
            aspect-ratio: 3/4; /* 竖版照片比例，可根据需要改为 1/1 或 16/9 */
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.9rem;
        }

        .photo-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-section {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center; /* 让内部行内元素居中 */
        }

        .video-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .video-container {
            display: flex;
            justify-content: center; /* 水平居中 */
            align-items: center;     /* 垂直居中 */
        }
        /* 新增：图片项相对定位，以便内部绝对定位点赞数 */
        .photo-item {
            position: relative; /* 关键：作为定位父级 */
            background-color: #ddd;
            aspect-ratio: 3/4;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.9rem;
        }

        /* 新增：点赞数标签样式 */
        .like-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(2px);
            z-index: 10;
        }
        
        .like-badge::before {
            content: '❤️';
            font-size: 0.9rem;
        }

        /* 图片标题悬浮层 (可选，如果想显示标题) */
        .photo-info {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .photo-item:hover .photo-info {
            opacity: 1;
        }
    </style>
    <script src="./js/utils.js"></script>
</head>

<body>
    <!-- 上方主菜单 -->
    <header>
        <div class="logo">
            <img src="https://video--online.oss-cn-beijing.aliyuncs.com/webres/Logo.png" alt="Logo">
            <span>视觉一中</span>
        </div>
        <nav>
            <ul>
                <li><a href="./upload.html">上传</a></li>
                <li><a href="./shows.html">画廊</a></li>
                <!-- 关于按钮触发器 -->
                <li><a href="#" id="about-trigger">关于</a></li>
            </ul>
        </nav>
    </header>

    <!-- 下方大字标题 -->
    <section class="hero-section">
        <h1 class="hero-title">视觉一中——呼市一中学生的图片站</h1>
    </section>

    <section class="gallery-section" id="gallery">
        <h2 class="section-title">每周精选</h2>
        <!-- 添加 ID 以便 JS 操作 -->
        <div class="photo-grid" id="weeklyPhotoGrid">
            <!-- JS 将在这里动态插入图片 -->
            <div class="photo-item">加载中...</div>
        </div>
    </section>

    <section class="video-section">
        <h2 class="video-title">呼和浩特市第一中学</h2>
        <div class="video-container">
            <iframe
                src="https://player.bilibili.com/player.html?isOutside=true&aid=113961236173618&bvid=BV1QZNtevEbx&cid=25753886317&p=1"
                scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"
                width="100%"
                height="600"
>
            </iframe>
        </div>
    </section>


</div>
    <script>
        // 关于按钮触发器逻辑
        document.getElementById('about-trigger').addEventListener('click', function (e) {
            e.preventDefault(); // 阻止默认链接跳转
            window.location.href = './about.html';
        });

        async function loadWeeklyPhotos() {
            const gridContainer = document.getElementById('weeklyPhotoGrid');
            if (!gridContainer) return;

            // OSS Bucket 地址
            const indexJsonUrl = 'https://video--online.oss-cn-beijing.aliyuncs.com/images/index.json';

            try {
                const response = await fetch(indexJsonUrl);
                if (!response.ok) {
                    throw new Error('无法获取图片索引');
                }

                let photos = await response.json();

                // 1. 过滤：只保留图片 (key 以 images/ 开头且不是 index.json)
                photos = photos.filter(item => item.key && item.key.startsWith('images/'));

                // 2. 【核心修改】排序：按 likes 降序排列 (点赞多的在前面)
                // 如果点赞数相同，可以辅助按 updateTime 降序排列
                photos.sort((a, b) => {
                    const likesA = a.likes || 0;
                    const likesB = b.likes || 0;

                    if (likesB !== likesA) {
                        return likesB - likesA; // 点赞数高的排前面
                    }
                    return (b.updateTime || 0) - (a.updateTime || 0); // 点赞相同时，新的排前面
                });

                // 3. 取前 5 张
                const top5 = photos.slice(0, 5);

                // 4. 清空容器
                gridContainer.innerHTML = '';

                if (top5.length === 0) {
                    gridContainer.innerHTML = '<div class="photo-item">暂无图片</div>';
                    return;
                }

                // 5. 渲染图片
                top5.forEach(photo => {
                    // 构建完整的图片 URL
                    const imgUrl = `https://video--online.oss-cn-beijing.aliyuncs.com/${photo.key}`;
                    const title = photo.title || '未命名';
                    const author = photo.author || '匿名';
                    const likes = photo.likes || 0;

                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'photo-item';

                    // 构建 HTML
                    itemDiv.innerHTML = `
                            <img src="${imgUrl}" alt="${title}" loading="lazy" onerror="this.src='https://video--online.oss-cn-beijing.aliyuncs.com/webres/Logo.png'">
                            <div class="photo-info">
                                <div style="font-weight:bold;">${title}</div>
                                <div style="font-size:0.8rem; opacity:0.8;">by ${author}</div>
                            </div>
                            <div class="like-badge">${likes}</div>
                        `;

                    gridContainer.appendChild(itemDiv);
                });

            } catch (error) {
                console.error('加载每周精选失败:', error);
                gridContainer.innerHTML = '<div class="photo-item">加载失败</div>';
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadWeeklyPhotos);
    </script>

</body>

</html>
