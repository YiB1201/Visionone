<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视觉一中—图片上传</title>
    <!-- 引入 ali-oss SDK -->
    <script src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.17.1.min.js"></script>
    <link rel="stylesheet" href="./css/upload.css">
    <link rel="icon" href="https://video--online.oss-cn-beijing.aliyuncs.com/webres/Logo.png" type="image/png">
    <script src="./js/utils.js"></script> <!-- 1. 基础 STS -->
    <script src="./js/ossManager.js"></script> <!-- 2. 核心管理器 (依赖 utils) -->
    <script src="./js/upload.js"></script> <!-- 3. 业务逻辑 (依赖 manager) -->
</head>

<body>

    <!-- 统一顶部导航 -->
    <header>
        <div class="logo">
            <img src="https://video--online.oss-cn-beijing.aliyuncs.com/webres/Logo.png" alt="Logo">
            <span>视觉一中</span>
        </div>
        <nav>
            <ul>
                <li><a href="./upload.html" style="opacity: 0.8; border-bottom: 2px solid white;">上传</a></li>
                <li><a href="./shows.html">画廊</a></li>
                <li><a href="./index.html">首页</a></li>
            </ul>
        </nav>
    </header>

    <div class="upload-main-container">
        <div class="upload-card">
            <h2>📤 图片批量上传</h2>
    
            <!-- 拖拽/点击上传区域 -->
            <div class="upload-area" id="dropZone">
                <div class="upload-icon">☁️</div>
                <!-- 修改提示文字 -->
                <div class="upload-text">点击或拖拽多张图片到此处上传</div>
                <!-- 【关键修改】添加 multiple 属性 -->
                <input type="file" id="fileInput" accept="image/*" multiple>
            </div>
    
            <!-- 修改显示文本的逻辑将在 JS 中处理 -->
            <div class="file-name" id="fileNameDisplay"></div>
    
            <div class="meta-inputs">
                <div style="margin-bottom: 15px;">
                    <!-- 【修改】添加红色星号表示必填，更新 Label -->
                    <label for="imageTitle" class="meta-label">图片标题 <span style="color:red">*</span></label>
                    <!-- 【修改】更新 Placeholder 提示规则 -->
                    <input type="text" id="imageTitle" class="meta-input" placeholder="单图直接使用；多图将自动添加序号 (如: 标题-1)" required>
                    <div style="margin-bottom: 15px;">
                        <label for="deletePassword" class="meta-label">删除密码 <span style="color:red">*</span></label>
                        <input type="password" id="deletePassword" class="meta-input" placeholder="所有文件共用此密码" required>
                    </div>
                </div>
                <div>
                    <label for="authorName" class="meta-label">作者昵称</label>
                    <input type="text" id="authorName" class="meta-input" placeholder="请输入作者昵称，不填则为匿名">
                </div>
            </div>
    
            <button class="btn-upload" onclick="handleUpload()" id="uploadBtn">开始上传</button>
    
            <!-- 进度条容器 -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
                <span class="progress-text" id="progressText">准备上传...</span>
            </div>
    
            <!-- 结果展示：用于显示详细列表 -->
            <div id="result"></div>
        </div>
    </div>

->
    <div id="successModal" class="custom-modal-overlay" style="display: none;">
        <div class="custom-modal">
            <div class="modal-title">✅ 上传成功！</div>
            <div class="modal-countdown">
                <span id="countdownText">5</span> 秒后自动前往画廊...
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-secondary" onclick="stayAndUpload()">继续上传</button>
                <button class="btn-modal btn-primary" onclick="goToGallery()">查看画廊</button>
            </div>
        </div>
    </div>

    <!-- 错误弹窗也确保默认隐藏 -->
    <div id="errorModal" class="custom-modal-overlay" style="display: none;">
        <div class="custom-modal error-modal">
            <div class="modal-icon">⚠️</div>
            <div class="modal-title" id="errorModalTitle">提示</div>
            <div class="modal-message" id="errorModalMessage">内容</div>
            <div class="modal-actions">
                <button class="btn-modal btn-primary" onclick="closeErrorModal()">我知道了</button>
            </div>
        </div>
    </div>

    <script src="./js/upload.js"></script>
</body>
</html>

    <script src="./js/upload.js"></script>
</body>

</html>
